<!doctype html>
<!--
  GitHub Pages SPA fallback trick: GH Pages serves this file for unknown URLs.
  The script below redirects to index.html with the original path encoded so
  the client router can restore it. Safe to delete if you don't use GH Pages.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'" />
  </head>
  <body></body>
</html>
